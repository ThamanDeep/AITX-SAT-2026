# Custom NemoClaw policy preset: sandbox -> host search-cache micro-service.
# The service runs on the EC2 host at the sandbox egress bridge (10.200.0.1),
# holds the DB creds, and proxies search_cache read/write. Agents stay
# credential-free. Apply with:
#   nemoclaw openclaw policy-add --from-file /deploy/config/policies/search-cache.yaml --yes

preset:
  name: search-cache
  description: "Smart re-search cache via host micro-service (credential-free agents)"

network_policies:
  search-cache:
    name: search-cache
    endpoints:
      - host: 10.200.0.1
        port: 8787
        protocol: rest
        enforcement: enforce
        rules:
          - allow: { method: GET, path: "/search-cache" }
          - allow: { method: POST, path: "/search-cache" }
    binaries:
      - { path: /usr/local/bin/node }
      - { path: /usr/bin/node }
      - { path: /usr/local/bin/curl }
      - { path: /usr/bin/curl }
